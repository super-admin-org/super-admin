name: run-tests

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 13 requires PHP 8.3+
          - php: '8.4'
            laravel: '13.*'
          - php: '8.3'
            laravel: '13.*'
          # Laravel 12
          - php: '8.4'
            laravel: '12.*'
          - php: '8.3'
            laravel: '12.*'
          - php: '8.2'
            laravel: '12.*'
          # Laravel 11
          - php: '8.4'
            laravel: '11.*'
          - php: '8.3'
            laravel: '11.*'
          - php: '8.2'
            laravel: '11.*'
          # Laravel 10
          - php: '8.3'
            laravel: '10.*'
          - php: '8.2'
            laravel: '10.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, gd, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Verify installation
        run: |
          php -v
          composer show laravel/framework --format=json | python3 -c "import json,sys; print('Laravel', json.loads(sys.stdin.read())['versions'][0])"

      - name: Run tests
        run: vendor/bin/pest --compact

